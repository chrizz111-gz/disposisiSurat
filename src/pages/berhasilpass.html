<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Berhasil Diubah</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/berhasilpass.css">
</head>
<body>

  <!-- NAVBAR -->
    <header class="topbar">
        <img src="../assets/logo.png" class="logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

  <!-- MAIN -->
  <section class="container">

    <!-- CARD -->
    <div class="success-card">

      <!-- MASKOT -->
      <div class="maskot-top">
        <!-- Ganti gambar maskot -->
        <img src="../assets/maskotsmk.png" alt="Maskot">
      </div>

      <!-- ICON -->
      <div class="success-icon">
        <!-- Ganti icon -->
        <img src="../assets/shield.png" alt="Success">
      </div>

      <!-- TITLE -->
      <h1>Kata sandi berhasil diubah!</h1>

      <!-- DESC -->
      <p class="desc">
        Selamat! Kata sandi akun kamu telah
        berhasil diperbarui. Silakan masuk
        menggunakan kata sandi baru kamu.
      </p>

      <!-- BUTTON -->
      <button class="login-btn">
        Masuk sekarang →
      </button>

      <!-- SUPPORT -->
      <p class="support-text">
        Butuh bantuan?
        <span>Hubungi support</span>
      </p>

    </div>

  </section>

</body>
</html>
