<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disposisi Detail Surat</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kepsekdetailmasuk.css">
</head>

<body>

    <!-- ================= TOPBAR ================= -->
    <header class="topbar">
        <img src="../assets/logo.png" class="logo" alt="Logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

    <!-- ================= CONTAINER ================= -->
    <div class="container-detail">

        <!-- JUDUL -->
        <h2 class="title">DETAIL SURAT MASUK</h2>

        <div class="detail-wrapper">

            <!-- ================= KOLOM KIRI ================= -->
            <div class="left-panel">

                <!-- CARD DETAIL SURAT -->
                <div class="card surat-preview">

                    <h3>Informasi Surat</h3>

                    <div class="surat-item">

                        <div class="item-row">
                            <span class="label">Nomor Surat</span>
                            <span class="separator">:</span>
                            <span class="value">421/SMKN2/2025</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Tanggal</span>
                            <span class="separator">:</span>
                            <span class="value">12 Oktober 2025</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Asal</span>
                            <span class="separator">:</span>
                            <span class="value">Dinas Pendidikan Malang</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Perihal</span>
                            <span class="separator">:</span>
                            <span class="value">Undangan Rapat Koordinasi</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Lampiran</span>
                            <span class="separator">:</span>
                            <span class="value">1 Berkas PDF</span>
                        </div>

                    </div>

                    <!-- LAMPIRAN -->
                    <div class="lampiran-box">
                        <p>Lihat Lampiran (PDF)</p>
                    </div>

                    <div class="left-button-area">

                        <button
                            class="btn-back"
                            onclick="window.location.href='homeKepsek.html'">
                            ← Kembali
                        </button>

                    </div>
                </div>


            </div>

            <!-- ================= KOLOM KANAN ================= -->
            <!-- ================= KOLOM KANAN ================= -->
            <div class="right-panel">

                <div class="card">

                    <h3>Informasi Disposisi</h3>

                    <!-- STATUS -->
                    <div class="form-group">
                        <label>Status Surat</label>

                        <select id="statusSurat">
                            <option value="">- Pilih Status Surat -</option>
                            <option value="terima">Terima</option>
                            <option value="tolak">Tolak</option>
                        </select>
                    </div>
                    <!-- FORM TERIMA -->
                    <div id="formTerima" class="hidden">

                        <div class="form-group">
                            <label>Diteruskan Ke</label>

                            <select>
                                <option>- Pilih Divisi -</option>
                                <option>Waka Kurikulum</option>
                                <option>Waka Kesiswaan</option>
                                <option>Waka Humas</option>
                                <option>Waka Sarpras</option>
                                <option>Kepala Program</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Proses Lebih Lanjut</label>
                            <textarea></textarea>
                        </div>

                        <div class="form-group">
                            <label>Tanggapan dan Saran</label>
                            <textarea></textarea>
                        </div>

                        <div class="form-group">
                            <label>Catatan</label>
                            <textarea></textarea>
                        </div>

                        <div class="form-group">
                            <label>Koordinasi / Konfirmasi</label>
                            <textarea></textarea>
                        </div>

                    </div>

                    <!-- FORM TOLAK -->
                    <div id="formTolak" class="hidden">

                        <div class="form-group">
                            <label>Catatan Penolakan</label>
                            <textarea placeholder="Masukkan alasan penolakan..."></textarea>
                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="button-group hidden" id="buttonArea">

                        <button
                            class="btn-kembali"
                            onclick="window.location.href='notif_teruskan.html'">
                            ← Teruskan
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

<script>

const statusSurat = document.getElementById("statusSurat");

const formTerima = document.getElementById("formTerima");
const formTolak = document.getElementById("formTolak");
const buttonArea = document.getElementById("buttonArea");

statusSurat.addEventListener("change", function () {

    // RESET
    formTerima.classList.add("hidden");
    formTolak.classList.add("hidden");
    buttonArea.classList.add("hidden");

    // TERIMA
    if (this.value === "terima") {

        formTerima.classList.remove("hidden");
        buttonArea.classList.remove("hidden");

    }

    // TOLAK
    else if (this.value === "tolak") {

        formTolak.classList.remove("hidden");
        buttonArea.classList.remove("hidden");

    }

});

</script>
</body>
</html>
