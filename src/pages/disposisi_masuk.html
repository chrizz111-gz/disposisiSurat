<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disposisi Detail Surat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/disposisi_masuk.css">
</head>

<body>

    <header class="topbar">
        <img src="../assets/logo.png" class="logo" alt="Logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

    <div class="container-detail">
        <h2 class="title">DETAIL SURAT MASUK</h2>

        <div class="detail-wrapper">

            <!-- KOLOM KIRI -->
            <div class="left-panel">
                <div class="card surat-preview">
                    <h3>Informasi Surat</h3>
                    <div class="surat-item">
                        <div class="item-row">
                            <span class="label">Nomor Surat</span>
                            <span class="separator">:</span>
                            <span class="value" id="valNoSurat">-</span>
                        </div>
                        <div class="item-row">
                            <span class="label">Tanggal</span>
                            <span class="separator">:</span>
                            <span class="value" id="valTanggal">-</span>
                        </div>
                        <div class="item-row">
                            <span class="label">Asal</span>
                            <span class="separator">:</span>
                            <span class="value" id="valAsal">-</span>
                        </div>
                        <div class="item-row">
                            <span class="label">Perihal</span>
                            <span class="separator">:</span>
                            <span class="value" id="valPerihal">-</span>
                        </div>
                        <div class="item-row">
                            <span class="label">Lampiran</span>
                            <span class="separator">:</span>
                            <span class="value">1 Berkas PDF</span>
                        </div>
                    </div>

                    <div class="lampiran-box" id="lampiranBox">
                        <p>Memuat lampiran...</p>
                    </div>

                    <div class="left-button-area">
                        <button class="btn-back" onclick="window.location.href='homeKepsek.html'">
                            ← Kembali
                        </button>
                    </div>
                </div>
            </div>

            <!-- KOLOM KANAN -->
            <div class="right-panel">
                <div class="card">
                    <h3>Informasi Disposisi</h3>

                    <div class="form-group">
                        <label>Status Surat</label>
                        <select id="statusSurat">
                            <option value="">- Pilih Status Surat -</option>
                            <option value="terima">Terima</option>
                            <option value="tolak">Tolak</option>
                        </select>
                    </div>

                    <!-- FORM TERIMA -->
                    <div id="formTerima" class="hidden">

                        <div class="form-group">
                            <label>Teruskan ke Jabatan</label>
                            <input type="text" id="searchJabatan" placeholder="Ketik untuk cari jabatan..."
                                style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);
                                background:rgba(255,255,255,0.15);color:white;font-size:14px;margin-bottom:8px;box-sizing:border-box;">
                            <div id="dropdownJabatan"
                                style="display:none;max-height:200px;overflow-y:auto;
                                background:#1e2a3a;border:1px solid rgba(255,255,255,0.2);border-radius:8px;margin-bottom:10px;">
                            </div>
                            <div id="selectedJabatans" style="display:flex;flex-wrap:wrap;gap:6px;min-height:32px;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Proses Lebih Lanjut</label>
                            <textarea id="prosesLanjut" placeholder="Masukkan proses lebih lanjut..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Tanggapan dan Saran</label>
                            <textarea id="tanggapanSaran" placeholder="Masukkan tanggapan dan saran..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Catatan</label>
                            <textarea id="catatanTerima" placeholder="Masukkan catatan..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Koordinasi / Konfirmasi</label>
                            <textarea id="koordinasiKonfirmasi"
                                placeholder="Masukkan koordinasi/konfirmasi..."></textarea>
                        </div>

                    </div>

                    <!-- FORM TOLAK -->
                    <div id="formTolak" class="hidden">
                        <div class="form-group">
                            <label>Catatan Penolakan</label>
                            <textarea id="catatanTolak" placeholder="Masukkan alasan penolakan..."></textarea>
                        </div>
                    </div>

                    <div class="button-group hidden" id="buttonArea">
                        <button class="btn-kembali" id="btnTeruskan">← Teruskan</button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div id="customAlert" class="custom-alert" style="display:none;">
        <div class="alert-box">
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/disposisi_masuk.js"></script>

</body>

</html>
