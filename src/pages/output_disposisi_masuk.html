<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Surat</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kepsekdetailmasuk.css">
</head>

<body>

    <!-- ================= TOPBAR ================= -->
    <header class="topbar">
        <img src="../assets/logo.png" class="logo" alt="Logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

    <!-- ================= CONTAINER ================= -->
    <div class="container-detail">

        <!-- JUDUL -->
        <h2 class="title">DETAIL SURAT MASUK</h2>

        <div class="detail-wrapper">

            <!-- ================= KOLOM KIRI ================= -->
            <div class="left-panel">

                <!-- CARD DETAIL SURAT -->
                <div class="card surat-preview">

                    <h3>Informasi Surat</h3>

                    <div class="surat-item">

                        <div class="item-row">
                            <span class="label">Nomor Surat</span>
                            <span class="value">: 421/SMKN2/2025</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Tanggal</span>
                            <span class="value">: 12 Oktober 2025</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Asal</span>
                            <span class="value">: Dinas Pendidikan Malang</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Perihal</span>
                            <span class="value">: Undangan Rapat Koordinasi</span>
                        </div>

                        <div class="item-row">
                            <span class="label">Lampiran</span>
                            <span class="value">: 1 Berkas PDF</span>
                        </div>

                    </div>

                    <!-- LAMPIRAN -->
                    <div class="lampiran-box">
                        <p>Lihat Lampiran (PDF)</p>
                    </div>

                </div>

                <!-- CARD DISPOSISI -->
                <div class="card">

                    <h3>Informasi Disposisi</h3>

                    <div class="form-group">
                        <label>Diteruskan Ke</label>

                        <select>
                            <option>- Pilih Divisi -</option>
                            <option>Waka Kurikulum</option>
                            <option>Waka Kesiswaan</option>
                            <option>Waka Humas</option>
                            <option>Waka Sarpras</option>
                            <option>Kepala Program</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Sifat Surat</label>

                        <select>
                            <option>- Pilih Sifat -</option>
                            <option>Penting</option>
                            <option>Rahasia</option>
                            <option>Segera</option>
                            <option>Biasa</option>
                        </select>
                    </div>

                </div>

            </div>

            <!-- ================= KOLOM KANAN ================= -->
            <div class="right-panel">

                <div class="card">

                    <h3>Proses & Tanggapan</h3>

                    <div class="form-group">
                        <label>Proses Lebih Lanjut</label>
                        <textarea placeholder="Masukkan proses lebih lanjut..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Tanggapan dan Saran</label>
                        <textarea placeholder="Masukkan tanggapan atau saran..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Catatan</label>
                        <textarea placeholder="Tambahkan catatan..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Koordinasi / Konfirmasi</label>
                        <textarea placeholder="Masukkan koordinasi atau konfirmasi..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Status Surat</label>
                    </div>

                    <!-- BUTTON -->
                    <div class="button-group">

                        <div class="left-buttons">
                            <button class="btn-accept">
                                Diterima
                            </button>
                        </div>

                        <button 
                            class="btn-kembali"
                            onclick="window.location.href='home.html'">
                            ← Teruskan
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
