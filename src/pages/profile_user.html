<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home.css"> <!-- 🔥 pakai ini -->
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <img src="../assets/logo.png" class="logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

    <!-- ================= HAMBURGER ================= -->
    <button id="toggleSidebar" class="hamburger" aria-label="Toggle Sidebar">
        III
    </button>

    <!-- WRAPPER -->
    <div class="wrapper">

        <!-- SIDEBAR (COPY DARI HOMEPAGE) -->
        <aside id="sidebar" class="sidebar hidden">
            <a href="home_user.html" class="side-btn">
                BERANDA <img src="../assets/home.png">
            </a>

            <a href="profile_user.html" class="side-btn">
                PENGGUNA <img src="../assets/user.png">
            </a>


            <a href="history_user.html" class="side-btn">

            </a>

        </aside>

        <!-- CONTENT -->
        <main class="content">

            <div class="profile-container">

                <!-- FOTO -->
                <div class="profile-photo">

                </div>

                <!-- CARD -->
                <div class="profile-card">
                    <h3>Informasi Profil</h3>

                    <div class="form-group">
                        <label>Nama</label>
                        <input type="text" id="nama" value="Frncs">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" value="frncs@email.com">
                    </div>

                    <div class="form-group">
                        <label>Jabatan</label>
                        <input type="jbtn" id="jbtn" value="Kepsek/Waka">
                    </div>


                    <a href="gantipass.html" class="btn-link">
                        Ganti Password
                    </a>
                </div>

            </div>

        </main>

    </div>

    <!-- SCRIPT SIDEBAR -->
    <script src="../js/sidebar.js"></script>
