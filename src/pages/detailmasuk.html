<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Surat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kepsekdetailmasuk.css">
</head>
<body>

    <header class="topbar">
        <img src="../assets/logo.png" class="logo" alt="Logo">
        <h2>DISPOSISI SURAT</h2>
    </header>
    
<div class="container-detail">

    <h2 class="title">DETAIL SURAT</h2>

    <div class="detail-wrapper">

        <!-- KOLOM KIRI -->
        <div class="left-panel">
            <div class="card surat-preview">
    <h3>Surat Masuk</h3>

    <div class="surat-item">
        <div class="item-row">
            <span class="label">Nomor Surat</span>
        </div>

        <div class="item-row">
            <span class="label">Tanggal</span>
        </div>

        <div class="item-row">
            <span class="label">Pengirim</span>
        </div>

        <div class="item-row">
            <span class="label">Perihal</span>
        </div>
    </div>

    <div class="lampiran-box">
        <p>Lihat Lampiran (PDF)</p>
    </div>
</div>
            <div class="card">
                <h3>Informasi Surat</h3>

                <div class="form-group">
                    <label>Surat Masuk</label>
                    <input type="text" placeholder="Nomor Surat">
                </div>

                <div class="form-group">
                    <label>Diteruskan Ke</label>
                    <select>
                        <option>- Pilih -</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Sifat</label>
                    <select>
                        <option>- Pilih -</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- KOLOM KANAN -->
        <div class="right-panel">
            <div class="card">
                <h3>Proses & Tanggapan</h3>

                <div class="form-group">
                    <label>Proses Lebih Lanjut</label>
                    <textarea></textarea>
                </div>

                <div class="form-group">
                    <label>Tanggapan dan Saran</label>
                    <textarea></textarea>
                </div>

                <div class="form-group">
                    <label>Catatan</label>
                    <textarea></textarea>
                </div>

                <div class="form-group">
                    <label>Koordinasi / Konfirmasi</label>
                    <textarea></textarea>
                </div>

                <div>
                    <label>Status</label>
                </div>

                <div class="button-group">
                    <div class="left-buttons">
                        <button class="btn-accept">Diterima</button>
                    </div>

                    <button class="btn-kembali" onclick="window.location.href='home.html'">
                        ← Kembali
                    </button>
                </div>
                
            </div>
        </div>

    </div>
</div>

</body>
</html>
