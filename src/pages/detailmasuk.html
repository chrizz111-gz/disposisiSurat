<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Detail Surat Masuk</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/suratmasuk.css">
</head>

<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <img src="../assets/logo.png" class="logo">
        <h2>DISPOSISI SURAT</h2>
    </header>

    <!-- HAMBURGER -->
    <button id="toggleSidebar" class="hamburger" aria-label="Toggle Sidebar">
        III
    </button>

    <!-- WRAPPER -->
    <div class="wrapper">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar hidden">
            <a href="home.html" class="side-btn">
                BERANDA <img src="../assets/home.png" alt="">
            </a>
            <a href="profile.html" class="side-btn">
                PENGGUNA <img src="../assets/user.png" alt="">
            </a>
            <a href="suratmasuk.html" class="side-btn">
                SURAT MASUK <img src="../assets/in.png" alt="">
            </a>
            <a href="suratkeluar.html" class="side-btn">
                SURAT KELUAR <img src="../assets/out.png" alt="">
            </a>
            <a href="history.html" class="side-btn">
                RIWAYAT <img src="../assets/history.png" alt="">
            </a>
            <a href="usermanage.html" class="side-btn">
                PERSETUJUAN AKUN <img src="../assets/users.png" alt="">
            </a>
        </aside>

        <!-- CONTENT -->
        <main class="content">

            <div class="form-box">
                <div class="form-title">SURAT MASUK</div>

                <form onsubmit="return false;">

                    <label>Dari</label>
                    <input type="text" id="asalSurat" placeholder="-" readonly>

                    <label>No Surat</label>
                    <input type="text" id="noSurat" placeholder="-" readonly>

                    <label>Hal / Perihal</label>
                    <input type="text" id="perihalSurat" placeholder="-" readonly>

                    <label>Tanggal Surat</label>
                    <input type="date" id="tanggalSurat" disabled>

                </form>

                <!-- Preview nama file PDF -->
                <div class="preview-box" id="previewBox"></div>

                <!-- Hanya tombol Kembali -->
                <div class="button-row">
                    <button type="button" class="upload-btn" id="btnKembali">Kembali</button>
                </div>

            </div>

        </main>

    </div>

    <!-- ALERT -->
    <div id="customAlert" class="custom-alert" style="display:none;">
        <div class="alert-box">
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/detailmasuk.js"></script>

</body>

</html>
