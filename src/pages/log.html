<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Aktivitas</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/log.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <img src="../assets/logo.png" class="logo" alt="Logo">
    <h2>DISPOSISI SURAT</h2>
  </header>

  <!-- CONTENT (tanpa wrapper & sidebar) -->
  <main class="log-content">

    <!-- HEADER -->
    <div class="log-header">
      <a href="usermanage.html" class="back-btn">← Kembali</a>
      <h1 class="page-title">📋 RIWAYAT AKTIVITAS</h1>
    </div>

    <!-- FILTER CARD -->
    <div class="filter-card">
      <div class="filter-group">
        <label>Tanggal</label>
        <input type="date" id="tanggalFilter">
      </div>

      <div class="filter-group">
        <label>Pengguna</label>
        <select id="penggunaFilter">
          <option value="">Semua Pengguna</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Aktivitas</label>
        <select id="aktivitasFilter">
          <option value="">Semua Aktivitas</option>
          <option value="login">Login</option>
          <option value="logout">Logout</option>
          <option value="create_surat">Membuat Surat</option>
          <option value="delete_surat">Menghapus Surat</option>
          <option value="forward_surat">Meneruskan Surat</option>
          <option value="read_surat">Membaca Surat</option>
          <option value="approve_surat">Menyetujui Surat</option>
          <option value="reject_surat">Menolak Surat</option>
          <option value="create_user">Membuat Akun</option>
          <option value="delete_user">Menghapus Akun</option>
          <option value="update_user">Mengubah Akun</option>
        </select>
      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>WAKTU</th>
              <th>PENGGUNA</th>
              <th>AKTIVITAS</th>
              <th>DETAIL</th>
            </tr>
          </thead>
          <tbody id="activityTable">
            <tr>
              <td colspan="4" class="loading-cell">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/log.js"></script>

</body>

</html>
